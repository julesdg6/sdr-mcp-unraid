<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDR MCP Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; }
    .wrap { max-width:1280px; margin:0 auto; padding:16px; }
    .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .status { padding:6px 10px; border-radius:6px; background:#1e293b; }
    button,select,input,textarea { background:#111827; color:#e2e8f0; border:1px solid #334155; border-radius:6px; padding:6px 8px; }
    textarea { min-width:220px; min-height:52px; }
    canvas { width:100%; border:1px solid #334155; border-radius:8px; background:#020617; display:block; }
    .grid { display:grid; gap:12px; grid-template-columns:1fr; }
    @media (min-width: 960px) { .grid { grid-template-columns:1fr 1fr; } }
    .muted { color:#94a3b8; font-size:12px; }
    .error { color:#fca5a5; }
    .warn { color:#f59e0b; font-weight:600; }
    .panel { background:#0b1220; border:1px solid #1e293b; border-radius:10px; padding:10px; }
    .list { margin-top:8px; display:flex; flex-direction:column; gap:6px; max-height:170px; overflow:auto; }
    .item { display:flex; gap:8px; align-items:center; justify-content:space-between; border:1px solid #334155; border-radius:6px; padding:6px 8px; }
    .item button { padding:3px 7px; }
    .version-bar { font-size:11px; color:#64748b; text-align:right; padding:4px 0 0; }
  </style>
</head>
<body>
<div class="wrap">
  <h2 style="margin-bottom:2px;">SDR MCP</h2>
  <div id="versionBar" class="version-bar">Version: loading…</div>
  <div class="row" style="margin-bottom:10px;">
    <button id="connectBtn">Connect</button>
    <span id="conn" class="status">disconnected</span>
    <span id="err" class="error"></span>
    <span id="audioWarn" class="warn"></span>
  </div>

  <div class="panel" style="margin-bottom:12px;">
    <div class="row">
      <label>Frequency (Hz) <input id="freq" value="198000" /></label>
      <button id="setFreq">Set</button>
      <button data-preset="198000" data-mode="AM">BBC Radio 4 LW 198 kHz</button>
      <button data-preset="162000" data-mode="AM">France Inter 162 kHz</button>
      <label>Gain
        <select id="gain"><option>auto</option><option>0</option><option>10</option><option>20</option><option>30</option><option>40</option><option>49.6</option></select>
      </label>
      <label>Sample rate
        <select id="rate"><option value="1024000">1.024M</option><option value="2048000" selected>2.048M</option><option value="2400000">2.4M</option></select>
      </label>
      <label>Demod
        <select id="demod"><option>AM</option><option selected>WFM</option><option>NFM</option></select>
      </label>
      <label>Colour map
        <select id="cmap"><option value="turbo">Turbo</option><option value="gray">Gray</option><option value="fire">Fire</option></select>
      </label>
      <button id="audioBtn">Play</button>
      <label>Volume <input id="vol" type="range" min="0" max="1" step="0.05" value="0.7"></label>
      <label><input id="lowCpuToggle" type="checkbox"> Low CPU mode</label>
    </div>
    <div id="status" class="muted" style="margin-top:6px;">No signal/data</div>
    <div id="perf" class="muted" style="margin-top:4px;">Performance stats unavailable</div>
  </div>

  <div class="grid" style="margin-bottom:12px;">
    <div class="panel"><canvas id="spec" width="900" height="260"></canvas></div>
    <div class="panel" id="waterfallPanel"><canvas id="water" width="900" height="260"></canvas></div>
  </div>

  <div class="grid">
    <div class="panel">
      <h3 style="margin:4px 0 8px;">Scan</h3>
      <div class="row" style="margin-bottom:8px;">
        <button id="scanBackBtn">◀ Scan</button>
        <button id="scanFwdBtn">▶ Scan</button>
        <button id="scanBtn">Range Scan</button>
        <button id="scanRefresh">Refresh</button>
      </div>
      <div class="row">
        <label>Start Hz <input id="scanStart" value="88000000"></label>
        <label>End Hz <input id="scanEnd" value="108000000"></label>
        <label>Step Hz <input id="scanStep" value="200000"></label>
        <label>Dwell ms <input id="scanDwell" value="120"></label>
        <label>Mode
          <select id="scanMode"><option>AM</option><option selected>WFM</option><option>NFM</option></select>
        </label>
        <label>Signal threshold dB <input id="scanThreshold" value="-45"></label>
        <label>Squelch score <input id="scanSquelch" value="0"></label>
      </div>
      <div id="scanStatus" class="muted" style="margin-top:6px;">No scan yet</div>
      <div id="scanResults" class="list"></div>
    </div>

    <div class="panel">
      <h3 style="margin:4px 0 8px;">Presets</h3>
      <div class="row">
        <label>Name <input id="presetName" placeholder="Station name"></label>
        <label>Notes <textarea id="presetNotes" placeholder="Optional notes"></textarea></label>
        <button id="savePreset">Save preset</button>
        <button id="refreshPresets">Refresh</button>
      </div>
      <div id="presetStatus" class="muted" style="margin-top:6px;">No presets loaded</div>
      <div id="presetList" class="list"></div>
    </div>
  </div>
</div>
<script>
let ws, connected=false, audioCtx, audioEnabled=false, nextAudioTime=0;
let audioQueue=[], audioBufferedSeconds=0, audioUnderruns=0, lastAudioStatusPush=0;
let audioPreBuffering=true;
const PREBUFFER_S = 0.3;
const spec=document.getElementById('spec'), water=document.getElementById('water');
const sctx=spec.getContext('2d'), wctx=water.getContext('2d');
const conn=document.getElementById('conn'), err=document.getElementById('err');
const statusEl=document.getElementById('status');
const perfEl=document.getElementById('perf');
const audioWarn=document.getElementById('audioWarn');
const vol=document.getElementById('vol');
const scanStatus=document.getElementById('scanStatus');
const scanResultsEl=document.getElementById('scanResults');
const presetStatus=document.getElementById('presetStatus');
const presetList=document.getElementById('presetList');
let latestSpectrum=null;

// Load version info from /version endpoint
fetch('/version').then(r=>r.ok?r.json():null).then(v=>{
  if(v){
    const parts=[];
    if(v.version) parts.push(`v${v.version}`);
    if(v.git_commit && v.git_commit!=='unknown') parts.push(`commit ${v.git_commit.slice(0,7)}`);
    if(v.build_time && v.build_time!=='unknown') parts.push(`built ${v.build_time.replace('T',' ').replace('Z','')}`);
    if(v.image_tag && v.image_tag!=='unknown') parts.push(`image ${v.image_tag}`);
    document.getElementById('versionBar').textContent='Version: '+(parts.join(' / ')||'n/a');
  } else {
    document.getElementById('versionBar').textContent='Version: unavailable';
  }
}).catch(()=>{ document.getElementById('versionBar').textContent='Version: unavailable'; });

function setConn(v){ conn.textContent=v; conn.style.background=v==='connected'?'#065f46':'#1e293b'; }
function send(command, params={}){ if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'command', command, params})); }

function cmap(v, m){
  if (!Number.isFinite(v)) return [120,120,120];
  if (m==='gray') { const c=Math.floor(v*255); return [c,c,c]; }
  if (m==='fire') return [Math.floor(255*v), Math.floor(180*Math.max(0,v-0.2)), Math.floor(60*Math.max(0,v-0.5))];
  return [Math.floor(255*v), Math.floor(255*(1-v)), Math.floor(200*(1-Math.abs(0.5-v)*2))];
}

function updateStats(st={}){
  statusEl.textContent=`Center ${Math.round(st.frequency_hz||0)} Hz | Rate ${Math.round(st.sample_rate||0)} | Gain ${st.gain??'n/a'} | Demod ${st.demod_mode||'n/a'}${st.low_cpu_mode?' | LOW CPU':''}`;
  const q=st.queue_depth||{};
  perfEl.textContent=`IQ/s ${Math.round(st.samples_per_sec||0)} | FFT FPS ${Number(st.fft_fps||0).toFixed(1)} | Visual FPS ${Number(st.visual_fps||0).toFixed(0)} | Dropped audio ${st.dropped_audio_frames||0} | Dropped visual ${st.dropped_visual_frames||0} | Queue capture/audio/fft/ws ${q.capture||0}/${q.audio||0}/${q.fft||0}/${q.ws||0} | Audio buffer ${Number(st.audio_buffer_fill_ms||0).toFixed(0)}ms`;
  if((st.audio_underruns||0) > 0) audioWarn.textContent=`Audio underruns: ${st.audio_underruns}`;
}

function drawSpectrum(data){
  const sp=(data.spectrum||[]).filter(Number.isFinite);
  if(!sp.length){ sctx.clearRect(0,0,spec.width,spec.height); sctx.fillStyle='#94a3b8'; sctx.fillText('No signal/data',20,20); return; }
  const min=data.db_min ?? Math.min(...sp), max=data.db_max ?? Math.max(...sp);
  sctx.clearRect(0,0,spec.width,spec.height);
  sctx.strokeStyle='#22d3ee'; sctx.beginPath();
  sp.forEach((v,i)=>{ const x=(i/(sp.length-1))*spec.width; const y=spec.height-(Math.max(0,Math.min(1,(v-min)/(max-min||1)))*spec.height); i?sctx.lineTo(x,y):sctx.moveTo(x,y); });
  sctx.stroke();
  if(data.peak&&Number.isFinite(data.peak.index)){
    const x=(data.peak.index/(sp.length-1))*spec.width;
    sctx.strokeStyle='#f59e0b'; sctx.beginPath(); sctx.moveTo(x,0); sctx.lineTo(x,spec.height); sctx.stroke();
  }
}

function drawWaterfall(data){
  const sp=data.spectrum||[];
  if(!sp.length || !sp.some(Number.isFinite)){
    wctx.fillStyle='rgba(2,6,23,0.3)'; wctx.fillRect(0,0,water.width,water.height);
    wctx.fillStyle='#94a3b8'; wctx.fillText('No signal/data',20,20);
    return;
  }
  const min=data.db_min ?? -90, max=data.db_max ?? -20;
  const line=wctx.createImageData(water.width,1);
  const step=sp.length/water.width;
  for(let x=0;x<water.width;x++){
    const i=Math.min(sp.length-1,Math.floor(x*step));
    const v=Math.max(0,Math.min(1,((sp[i]??min)-min)/((max-min)||1)));
    const [r,g,b]=cmap(v, document.getElementById('cmap').value);
    const p=x*4; line.data[p]=r; line.data[p+1]=g; line.data[p+2]=b; line.data[p+3]=255;
  }
  wctx.drawImage(water,0,-1); wctx.putImageData(line,0,water.height-1);
  wctx.fillStyle='rgba(15,23,42,0.7)'; wctx.fillRect(0,0,water.width,16);
  wctx.fillStyle='#cbd5e1'; wctx.font='11px monospace';
  const f=data.frequencies||[];
  if(f.length){
    wctx.fillText(`${Math.round(f[0])}Hz`,4,12);
    wctx.fillText(`${Math.round(f[Math.floor(f.length/2)])}Hz`,water.width/2-30,12);
    wctx.fillText(`${Math.round(f[f.length-1])}Hz`,water.width-90,12);
  }
}

function pushAudioChunk(pcmB64, rate){
  const bytes=Uint8Array.from(atob(pcmB64), c=>c.charCodeAt(0));
  const pcm=new Int16Array(bytes.buffer);
  const f32=new Float32Array(pcm.length);
  const volume=parseFloat(vol.value||'0.7');
  for(let i=0;i<pcm.length;i++) f32[i]=(pcm[i]/32768)*volume;
  const duration=f32.length/rate;
  audioQueue.push({f32, rate, duration});
  audioBufferedSeconds += duration;
}

function scheduleAudio(){
  if(!audioEnabled || !audioCtx) return;

  // Pre-buffering phase: wait until we have enough audio queued before starting playback
  if(audioPreBuffering){
    if(audioBufferedSeconds < PREBUFFER_S) return;
    audioPreBuffering = false;
    nextAudioTime = audioCtx.currentTime + 0.05;
  }

  if(nextAudioTime < audioCtx.currentTime){
    if(audioBufferedSeconds > 0.05){
      audioUnderruns += 1;
      audioWarn.textContent = `Audio underruns: ${audioUnderruns}`;
    }
    nextAudioTime = audioCtx.currentTime + 0.06;
  }

  while(audioQueue.length && (nextAudioTime - audioCtx.currentTime) < 0.5){
    const chunk=audioQueue.shift();
    const buf=audioCtx.createBuffer(1,chunk.f32.length,chunk.rate);
    buf.copyToChannel(chunk.f32,0);
    const src=audioCtx.createBufferSource(); src.buffer=buf; src.connect(audioCtx.destination);
    src.start(nextAudioTime);
    nextAudioTime += chunk.duration;
    audioBufferedSeconds = Math.max(0,audioBufferedSeconds - chunk.duration);
  }

  const now=Date.now();
  if(now - lastAudioStatusPush > 1000){
    lastAudioStatusPush = now;
    send('audio_buffer_status',{fill_ms:Math.max(0,(nextAudioTime - (audioCtx?.currentTime||0))*1000), underruns:audioUnderruns});
  }
}
setInterval(scheduleAudio, 40);

function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(nextAudioTime < audioCtx.currentTime) nextAudioTime = audioCtx.currentTime + 0.08;
}

function renderScanResults(results=[]){
  scanResultsEl.innerHTML='';
  if(!results.length){ scanResultsEl.innerHTML='<div class="muted">No candidates found</div>'; return; }
  for(const r of results){
    const row=document.createElement('div'); row.className='item';
    row.innerHTML=`<span>${Math.round(r.frequency_hz)} Hz | peak ${r.peak_db} dB | score ${r.score}</span>`;
    const controls=document.createElement('span');
    const tuneBtn=document.createElement('button'); tuneBtn.textContent='Tune';
    tuneBtn.onclick=()=>{
      document.getElementById('freq').value=String(r.frequency_hz);
      document.getElementById('demod').value=r.mode;
      send('set_frequency',{frequency:r.frequency_hz});
      send('set_demod_mode',{mode:r.mode});
    };
    const saveBtn=document.createElement('button'); saveBtn.textContent='Save';
    saveBtn.onclick=()=>{
      const name=prompt('Preset name for '+Math.round(r.frequency_hz)+' Hz:');
      if(name && name.trim()) send('save_preset',{
        name:name.trim(), frequency_hz:r.frequency_hz,
        mode:r.mode, sample_rate:parseFloat(document.getElementById('rate').value||'2048000'),
        gain:document.getElementById('gain').value, notes:''
      });
    };
    controls.append(tuneBtn, saveBtn);
    row.appendChild(controls);
    scanResultsEl.appendChild(row);
  }
}

function renderPresets(presets=[]){
  presetList.innerHTML='';
  if(!presets.length){ presetList.innerHTML='<div class="muted">No saved presets</div>'; return; }
  for(const p of presets){
    const row=document.createElement('div'); row.className='item';
    row.innerHTML=`<span><strong>${p.name}</strong> ${Math.round(p.frequency)} Hz ${p.mode} @ ${Math.round(p.sample_rate)} | gain ${p.gain}${p.notes?` — ${p.notes}`:''}</span>`;
    const controls=document.createElement('span');
    const tune=document.createElement('button'); tune.textContent='Tune'; tune.onclick=()=>send('tune_preset',{name:p.name});
    const edit=document.createElement('button'); edit.textContent='Edit'; edit.onclick=()=>{
      document.getElementById('presetName').value=p.name;
      document.getElementById('presetNotes').value=p.notes||'';
      document.getElementById('freq').value=String(p.frequency);
      document.getElementById('demod').value=p.mode;
      document.getElementById('rate').value=String(p.sample_rate);
      document.getElementById('gain').value=String(p.gain);
    };
    const del=document.createElement('button'); del.textContent='Delete'; del.onclick=()=>send('delete_preset',{name:p.name});
    controls.append(tune,edit,del);
    row.appendChild(controls);
    presetList.appendChild(row);
  }
}

function connect(){
  err.textContent='';
  ws = new WebSocket(((location.protocol==='https:')?'wss://':'ws://')+location.host+'/ws');
  setConn('connecting');
  ws.onopen=()=>{ connected=true; setConn('connected'); send('list_presets'); send('get_scan_results'); };
  ws.onclose=()=>{ connected=false; setConn('disconnected'); };
  ws.onerror=()=>{ setConn('error'); err.textContent='WebSocket error: unable to connect or stream data'; };
  ws.onmessage=(e)=>{
    let d; try{ d=JSON.parse(e.data); }catch{return;}
    if(d.type==='error'){ err.textContent=d.message||'Unknown stream error'; }
    else if(d.type==='response'){
      if(!d.success) err.textContent=d.message||'Command failed';
      if(d.command==='get_scan_results' && d.results) renderScanResults(d.results);
      if(d.command==='scan' || d.command==='scan_forward' || d.command==='scan_backward') scanStatus.textContent=d.message||'Scan started';
      if(['save_preset','delete_preset','tune_preset','list_presets'].includes(d.command)){
        if(d.presets) renderPresets(d.presets);
        if(d.preset && d.command!=='delete_preset') presetStatus.textContent=`Preset: ${d.preset.name}`;
        if(d.command!=='list_presets') send('list_presets');
      }
      if(d.status) updateStats(d.status);
      if(d.command==='get_scan_results') scanStatus.textContent=d.running?'Scan running...':`Scan complete. ${d.results?.length||0} candidates`;
    }
    else if(d.type==='spectrum'){ latestSpectrum=d; drawSpectrum(d); updateStats(d.status||{}); }
    else if(d.type==='waterfall'){ drawWaterfall(d); updateStats(d.status||{}); }
    else if(d.type==='no_data'){ statusEl.textContent='No signal/data'; }
    else if(d.type==='audio' && d.pcm_b64){ if(audioEnabled){ ensureAudio(); pushAudioChunk(d.pcm_b64, d.sample_rate||48000); } if(d.status) updateStats(d.status); }
    else if(d.type==='config' && d.status){ updateStats(d.status); }
  };
}

document.getElementById('connectBtn').onclick=()=>{ if(!connected) connect(); else ws.close(); };
document.getElementById('setFreq').onclick=()=>send('set_frequency',{frequency:parseFloat(document.getElementById('freq').value||'0')});
document.getElementById('gain').onchange=(e)=>send('set_gain',{gain:e.target.value});
document.getElementById('rate').onchange=(e)=>send('set_sample_rate',{sample_rate:parseFloat(e.target.value)});
document.getElementById('demod').onchange=(e)=>send('set_demod_mode',{mode:e.target.value});
for(const b of document.querySelectorAll('button[data-preset]')) b.onclick=()=>{
  const f=parseFloat(b.dataset.preset); const m=b.dataset.mode;
  document.getElementById('freq').value=String(f);
  document.getElementById('demod').value=m;
  send('set_frequency',{frequency:f}); send('set_demod_mode',{mode:m});
};
document.getElementById('audioBtn').onclick=(e)=>{
  audioEnabled=!audioEnabled;
  e.target.textContent=audioEnabled?'Stop':'Play';
  if(audioEnabled){ ensureAudio(); audioPreBuffering=true; audioBufferedSeconds=0; }
  else { audioQueue=[]; audioBufferedSeconds=0; }
  send(audioEnabled?'start_audio':'stop_audio');
};

document.getElementById('lowCpuToggle').onchange=(e)=>{
  send('set_low_cpu_mode',{enabled:e.target.checked});
  const wp=document.getElementById('waterfallPanel');
  wp.style.display=e.target.checked?'none':'';
};

document.getElementById('scanBtn').onclick=()=>{
  send('scan',{
    start_hz:parseFloat(document.getElementById('scanStart').value||'0'),
    end_hz:parseFloat(document.getElementById('scanEnd').value||'0'),
    step_hz:parseFloat(document.getElementById('scanStep').value||'0'),
    dwell_ms:parseInt(document.getElementById('scanDwell').value||'0',10),
    mode:document.getElementById('scanMode').value,
    signal_threshold_db:parseFloat(document.getElementById('scanThreshold').value||'-45'),
    squelch:parseFloat(document.getElementById('scanSquelch').value||'0')
  });
};
document.getElementById('scanFwdBtn').onclick=()=>{
  send('scan_forward',{
    step_hz:parseFloat(document.getElementById('scanStep').value||'200000'),
    dwell_ms:parseInt(document.getElementById('scanDwell').value||'120',10),
    threshold:parseFloat(document.getElementById('scanThreshold').value||'-45')
  });
  scanStatus.textContent='Forward scan started…';
};
document.getElementById('scanBackBtn').onclick=()=>{
  send('scan_backward',{
    step_hz:parseFloat(document.getElementById('scanStep').value||'200000'),
    dwell_ms:parseInt(document.getElementById('scanDwell').value||'120',10),
    threshold:parseFloat(document.getElementById('scanThreshold').value||'-45')
  });
  scanStatus.textContent='Backward scan started…';
};
document.getElementById('scanRefresh').onclick=()=>send('get_scan_results');

function collectPresetPayload(){
  return {
    name:(document.getElementById('presetName').value||'').trim(),
    frequency_hz:parseFloat(document.getElementById('freq').value||'0'),
    mode:document.getElementById('demod').value,
    sample_rate:parseFloat(document.getElementById('rate').value||'2048000'),
    gain:document.getElementById('gain').value,
    notes:document.getElementById('presetNotes').value||''
  };
}
document.getElementById('savePreset').onclick=()=>send('save_preset',collectPresetPayload());
document.getElementById('refreshPresets').onclick=()=>send('list_presets');
</script>
</body>
</html>
